# Fly.io app config for POTS PWA.
# Region cdg (Paris) — closest free Fly region to Switzerland.
# Single shared-cpu-1x VM, autoscale-to-zero off for now so magic-link
# verification doesn't get hit by cold-start latency.

app = "pots-tracker"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  ASPNETCORE_URLS        = "http://+:8080"
  # Resend is the email provider; secrets are set with `fly secrets set`.
  Email__Provider = "Resend"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 80
    hard_limit = 100

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
