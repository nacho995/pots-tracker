services:
  postgres:
    image: postgres:16-alpine
    container_name: pots-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pots_dev
      POSTGRES_PASSWORD: pots_dev_only_change_me
      POSTGRES_DB: pots
    ports:
      - "55432:5432"
    volumes:
      - pots_pgdata:/var/lib/postgresql/data
      - ./docker-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pots_dev -d pots"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pots_pgdata:
